[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "code-map"
version = "0.1.0"
description = "Progressive disclosure flow-mapping tool for FastAPI applications"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.24.0",
    "uvicorn>=0.22.0",
    "fastapi>=0.100.0",
    "starlette>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "anyio>=3.7.0",
    "respx>=0.20.0",
]

[tool.hatch.build.targets.wheel]
packages = ["flow_map"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["flow_map/spec"]
